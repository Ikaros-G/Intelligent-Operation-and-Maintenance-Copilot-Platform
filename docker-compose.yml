x-app: &app
  build: .
  env_file: [.env]
  environment: &app-env
    MILVUS_HOST: standalone
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    MCP_CLS_URL: http://mcp-cls:8003/mcp
    MCP_MONITOR_URL: http://mcp-monitor:8004/mcp
    PROMETHEUS_BASE_URL: http://prometheus:9090
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  restart: unless-stopped

services:
  api:
    <<: *app
    container_name: aiops-api
    ports: ["9900:9900"]
    volumes: ["./uploads:/app/uploads", "./logs:/app/logs"]
    depends_on:
      standalone: {condition: service_healthy}
      redis: {condition: service_healthy}

  celery-worker:
    <<: *app
    container_name: aiops-celery-worker
    command: celery -A app.tasks.celery_app:celery_app worker --loglevel=INFO --concurrency=2
    volumes: ["./uploads:/app/uploads", "./logs:/app/logs"]
    depends_on:
      standalone: {condition: service_healthy}
      redis: {condition: service_healthy}

  mcp-cls:
    <<: *app
    container_name: aiops-mcp-cls
    command: python mcp_servers/cls_server.py
    environment:
      <<: *app-env
      MCP_HOST: 0.0.0.0

  mcp-monitor:
    <<: *app
    container_name: aiops-mcp-monitor
    command: python mcp_servers/monitor_server.py
    environment:
      <<: *app-env
      MCP_HOST: 0.0.0.0

  redis:
    image: redis:8.0-alpine
    container_name: aiops-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir=/etcd
    volumes: ["etcd-data:/etcd"]

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: milvus-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    command: minio server /minio_data
    volumes: ["minio-data:/minio_data"]

  standalone:
    image: milvusdb/milvus:v2.5.10
    container_name: milvus-standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports: ["19530:19530", "9091:9091"]
    volumes: ["milvus-data:/var/lib/milvus"]
    depends_on: [etcd, minio]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: aiops-prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    ports: ["9090:9090"]
    volumes: ["./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro", "./observability/alerts.yml:/etc/prometheus/alerts.yml:ro"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1
    container_name: aiops-otel-collector
    command: ["--config=/etc/otelcol/config.yml"]
    volumes: ["./observability/otel-collector.yml:/etc/otelcol/config.yml:ro"]
    depends_on: [tempo]

  tempo:
    image: grafana/tempo:2.8.1
    container_name: aiops-tempo
    command: ["-config.file=/etc/tempo.yml"]
    volumes: ["./observability/tempo.yml:/etc/tempo.yml:ro", "tempo-data:/var/tempo"]

  grafana:
    image: grafana/grafana:12.1.0
    container_name: aiops-grafana
    ports: ["3000:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus, tempo]

volumes:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
  tempo-data:
